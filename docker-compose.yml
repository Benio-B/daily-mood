version: '3.8'

services:
  app:
    build: .
    container_name: mood-tracker
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - mood-tracker-network

networks:
  mood-tracker-network:
    driver: bridge
